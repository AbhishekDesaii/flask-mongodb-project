<!DOCTYPE html>
<html>
<head>
    <title>Student Form</title>

    <style>

        body{
            font-family: Arial;
            margin: 50px;
        }

        input{
            padding:10px;
            width:300px;
            margin-bottom:15px;
        }

        button{
            padding:10px 20px;
            background:blue;
            color:white;
            border:none;
        }

        .error{
            color:red;
            margin-bottom:20px;
        }

    </style>

</head>

<body>

    <h2>Student Registration</h2>

    {% if error %}
        <div class="error">
            {{ error }}
        </div>
    {% endif %}

    <form action="/submit" method="POST">

        <input type="text" name="name" placeholder="Enter Name" required>

        <br>

        <input type="email" name="email" placeholder="Enter Email" required>

        <br>

        <button type="submit">
            Submit
        </button>

    </form>

</body>
</html>
